# Karpenter EC2NodeClass — Graviton ARM64 instances for OpenClaw agents
# Applied after Foundation Stack deploy
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: openclaw-agents
spec:
  # Use AL2023 ARM64 AMI
  amiSelectorTerms:
    - alias: al2023@latest
  # Subnet discovery — use private subnets tagged by CDK
  subnetSelectorTerms:
    - tags:
        kubernetes.io/role/internal-elb: "1"
  # Security group discovery — use cluster security group
  securityGroupSelectorTerms:
    - tags:
        aws:eks:cluster-name: openclaw-platform
  # Instance profile — created by CDK (KarpenterNodeInstanceProfile)
  # Replace with actual name from CDK output
  instanceProfile: openclaw-platform-karpenter-node
  # Block device mapping
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  # Tags for cost tracking
  tags:
    Project: openclaw-on-eks-graviton
    ManagedBy: Karpenter
    NodeType: agent-workload
