# Karpenter NodePool — schedules OpenClaw agent workloads on Graviton
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: openclaw-agents
spec:
  template:
    metadata:
      labels:
        role: agent
        kubernetes.io/arch: arm64
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: openclaw-agents
      requirements:
        # Graviton instance families only
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["c6g", "c7g", "m6g", "m7g"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["large", "xlarge", "2xlarge"]
        # ARM64 architecture
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        # Prefer Spot, fall back to On-Demand
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
      # Don't schedule system workloads here
      taints:
        - key: openclaw.rocks/agent-workload
          value: "true"
          effect: NoSchedule
  # Cost optimization: consolidate underutilized nodes
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 60s
  # Limits — max resources Karpenter can provision
  limits:
    cpu: "64"      # ~16 x c6g.xlarge equivalent
    memory: 128Gi
  # Weight — prefer this pool for agent workloads
  weight: 100
