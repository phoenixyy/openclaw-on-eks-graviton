# Demo: Create namespace + secret + OpenClawInstance
# Run these commands to test the full flow manually:
#
#   kubectl apply -f k8s_manifests/demo/sample-instance.yaml
#   kubectl get openclawinstances -n openclaw-demo
#   kubectl get pods -n openclaw-demo
#
---
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-demo
  labels:
    openclaw.rocks/tenant: "demo"
---
# Create the API key secret before applying:
#   kubectl create secret generic openclaw-api-keys \
#     -n openclaw-demo \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..."
#
# Or for Bedrock (no API key needed — uses Pod Identity):
#   kubectl create secret generic openclaw-api-keys \
#     -n openclaw-demo \
#     --from-literal=PLACEHOLDER="bedrock-via-pod-identity"
---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: demo-agent
  namespace: openclaw-demo
spec:
  # Model configuration — Bedrock Claude via Pod Identity
  config:
    raw:
      agents:
        defaults:
          model:
            primary: "amazon-bedrock/ap-northeast-1.anthropic.claude-sonnet-4-20250514-v1:0"
  # Persistent storage via EFS
  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: efs-sc
  # Schedule on Karpenter agent nodes
  tolerations:
    - key: openclaw.rocks/agent-workload
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    role: agent
