# Default NetworkPolicy for tenant namespaces
# Applied by Provisioning Service when creating a new tenant
#
# Policy: deny all ingress/egress by default, then allow:
#   - DNS resolution (port 53)
#   - HTTPS egress (port 443) for Bedrock API calls
#   - Block metadata endpoint (169.254.169.254) to prevent credential theft
#   - Allow ingress from ALB (for web UI access)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-default
  # namespace: openclaw-<user_id>  — set by Provisioning Service
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ALB controller (Ingress)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 18789
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS (Bedrock, external APIs) but block metadata endpoint
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # Block EC2 metadata — prevent credential theft
